<style>
body{margin:0;padding:0;overflow:hidden;}
.ab-wrap{position:relative;width:100%;font-family:'Segoe UI',sans-serif;overflow:hidden;margin:0;padding:0;background-image:url('https://juleslyman.github.io/alisdx-banner/48673-ChatGPT-Image-Mar-9--2026--08_56_50-AM.png');background-size:cover;background-position:center center;height:130px;}
.ab-cd{
  position:absolute;
  top:0;right:0;bottom:0;
  display:flex;align-items:center;
  background:rgba(12,52,100,0.60);
  padding:0 12px;
  border-left:1px solid rgba(255,255,255,0.2);
  width:220px;
}
.ab-seg{text-align:center;padding:0 10px;}
.ab-seg+.ab-seg{border-left:1px solid rgba(255,255,255,.25);}
.ab-num{font-size:22px;font-weight:700;color:#fff;line-height:1;}
.ab-lbl{font-size:9px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.ab-cap{padding:0 0 0 12px;border-left:1px solid rgba(255,255,255,.25);font-size:10px;color:rgba(255,255,255,.8);text-align:center;white-space:nowrap;}
.ab-cap .go{font-size:9px;font-weight:600;color:rgba(255,255,255,.9);display:block;margin-bottom:4px;}
.ab-cap .dt{font-size:11px;font-weight:700;color:#fff;}
</style>

<div class="ab-wrap">
  <div class="ab-cd" id="abcd"></div>
</div>

<script>
var g=new Date('2026-06-15T00:00:00');
function p(n){return String(n).padStart(2,'0');}
function t(){
  var n=new Date(),d=g-n;
  if(d<=0){document.getElementById('abcd').innerHTML='<span style="color:#fff;font-weight:700;padding:0 16px;font-size:16px;">Go Live!</span>';return;}
  var dy=Math.floor(d/86400000),h=Math.floor((d%86400000)/3600000),
      m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
  document.getElementById('abcd').innerHTML=
    '<div class="ab-seg"><div class="ab-num">'+dy+'</div><div class="ab-lbl">days</div></div>'+
    '<div class="ab-seg"><div class="ab-num">'+p(h)+'</div><div class="ab-lbl">hrs</div></div>'+
    '<div class="ab-seg"><div class="ab-num">'+p(m)+'</div><div class="ab-lbl">min</div></div>'+
    '<div class="ab-seg"><div class="ab-num">'+p(s)+'</div><div class="ab-lbl">sec</div></div>'+
    '<div class="ab-cap"><span class="go">Days until Go Live</span><span class="dt">June 15, 2026</span></div>';}
t();setInterval(t,1000);
</script>
