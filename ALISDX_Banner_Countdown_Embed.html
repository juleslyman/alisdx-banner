<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <style> *{margin:0;padding:0;box-sizing:border-box;} html,body{width:100%;background:transparent;font-family:'Segoe UI',sans-serif;} .wrap{ position:relative; width:100%; max-width:1920px; height:160px; overflow:hidden; background:#eaf3fb; } .banner-img{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; object-position:left center; display:block; background:#eaf3fb; } .cd{ position:absolute; top:0; right:0; height:100%; width:210px; background:rgba(12,52,100,0.72); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 12px; gap:6px; z-index:2; } .cd-title{ font-size:11px; font-weight:700; color:#fff; text-transform:uppercase; letter-spacing:.5px; text-align:center; line-height:1.2; } .cd-nums{ display:flex; align-items:center; justify-content:center; gap:0; width:100%; } .cd-seg{ text-align:center; padding:0 8px; min-width:44px; } .cd-seg + .cd-seg{ border-left:1px solid rgba(255,255,255,.3); } .cd-num{ font-size:24px; font-weight:700; color:#fff; line-height:1; white-space:nowrap; } .cd-lbl{ font-size:8px; color:rgba(255,255,255,.78); text-transform:uppercase; letter-spacing:.5px; margin-top:2px; line-height:1.1; } .cd-date{ font-size:13px; font-weight:700; color:#fff; text-align:center; line-height:1.2; white-space:nowrap; } @media (max-width:900px){ .wrap{height:140px;} .cd{width:190px;} .cd-num{font-size:20px;} .cd-date{font-size:12px;} } @media (max-width:700px){ .wrap{height:120px;} .cd{width:175px; padding:8px;} .cd-title{font-size:10px;} .cd-num{font-size:18px;} .cd-lbl{font-size:7px;} .cd-date{font-size:11px;} .cd-seg{padding:0 5px; min-width:36px;} } </style> </head> <body> <div class="wrap"> <img class="banner-img" src="https://juleslyman.github.io/alisdx-banner/banner_cropped.png" alt="ALIS DX Banner" > <div class="cd"> <div class="cd-title">Days Until Go Live</div> <div class="cd-nums" id="nums"></div> <div class="cd-date">June 15, 2026</div> </div> </div> <script> var g = new Date('2026-06-15T00:00:00'); function p(n){ return String(n).padStart(2,'0'); } function t(){ var n = new Date(); var d = g - n; var el = document.getElementById('nums'); if(d <= 0){ el.innerHTML = '<span style="color:#fff;font-weight:700;font-size:16px;">Go Live!</span>'; return; } var dy = Math.floor(d / 86400000); var h = Math.floor((d % 86400000) / 3600000); var m = Math.floor((d % 3600000) / 60000); var s = Math.floor((d % 60000) / 1000); el.innerHTML = '<div class="cd-seg"><div class="cd-num">' + dy + '</div><div class="cd-lbl">days</div></div>' + '<div class="cd-seg"><div class="cd-num">' + p(h) + '</div><div class="cd-lbl">hrs</div></div>' + '<div class="cd-seg"><div class="cd-num">' + p(m) + '</div><div class="cd-lbl">min</div></div>' + '<div class="cd-seg"><div class="cd-num">' + p(s) + '</div><div class="cd-lbl">sec</div></div>'; } t(); setInterval(t, 1000); </script> </body> </html>
