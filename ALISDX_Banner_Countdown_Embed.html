<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:transparent;}
.wrap{
  position:relative;
  width:100%;
  height:160px;
  background-image:url('https://juleslyman.github.io/alisdx-banner/banner_cropped.png');
  background-size:cover;
  background-position:center center;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}
.cd{
  position:absolute;
  top:0;right:0;bottom:0;
  width:200px;
  background:rgba(12,52,100,0.70);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:0 10px;
  gap:6px;
  overflow:hidden;
}
.cd-title{font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:0.5px;text-align:center;}
.cd-nums{display:flex;align-items:center;gap:0;}
.cd-seg{text-align:center;padding:0 8px;}
.cd-seg+.cd-seg{border-left:1px solid rgba(255,255,255,.3);}
.cd-num{font-size:24px;font-weight:700;color:#fff;line-height:1;}
.cd-lbl{font-size:8px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.cd-date{font-size:13px;font-weight:700;color:#fff;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="cd">
    <div class="cd-title">Days until Go Live</div>
    <div class="cd-nums" id="nums"></div>
    <div class="cd-date">June 15, 2026</div>
  </div>
</div>
<script>
var g=new Date('2026-06-15T00:00:00');
function p(n){return String(n).padStart(2,'0');}
function t(){
  var n=new Date(),d=g-n;
  if(d<=0){document.getElementById('nums').innerHTML='<span style="color:#fff;font-weight:700;font-size:16px;">Go Live!</span>';return;}
  var dy=Math.floor(d/86400000),h=Math.floor((d%86400000)/3600000),
      m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
  document.getElementById('nums').innerHTML=
    '<div class="cd-seg"><div class="cd-num">'+dy+'</div><div class="cd-lbl">days</div></div>'+
    '<div class="cd-seg"><div class="cd-num">'+p(h)+'</div><div class="cd-lbl">hrs</div></div>'+
    '<div class="cd-seg"><div class="cd-num">'+p(m)+'</div><div class="cd-lbl">min</div></div>'+
    '<div class="cd-seg"><div class="cd-num">'+p(s)+'</div><div class="cd-lbl">sec</div></div>';}
t();setInterval(t,1000);
</script>
</body>
</html>
